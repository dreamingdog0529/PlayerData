name: Build-Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag(version), e.g. 0.1.0"
        required: true

jobs:
  build-dotnet:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: mkdir -p ../.local-feed
      - run: dotnet build src/PlayerData.Core/PlayerData.Core.csproj -c Release -p:Version=${{ inputs.tag }}
      - run: dotnet pack src/PlayerData.Core/PlayerData.Core.csproj -c Release -p:Version=${{ inputs.tag }} -o ./nupkgs
      - run: dotnet pack src/PlayerData.MessagePipe/PlayerData.MessagePipe.csproj -c Release -p:Version=${{ inputs.tag }} -o ./nupkgs
      - run: dotnet pack src/PlayerData.R3/PlayerData.R3.csproj -c Release -p:Version=${{ inputs.tag }} -o ./nupkgs
      - run: dotnet pack src/PlayerData.VitalRouter/PlayerData.VitalRouter.csproj -c Release -p:Version=${{ inputs.tag }} -o ./nupkgs
      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./nupkgs/*.nupkg
      # To publish to NuGet.org, add a NUGET_KEY secret and uncomment:
      # - run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_KEY }} --source https://api.nuget.org/v3/index.json
